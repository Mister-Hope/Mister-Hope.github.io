<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 220" width="100%" height="100%">
  <!-- Ground Line -->
  <line x1="50" y1="160" x2="450" y2="160" stroke="#000000" stroke-width="2" />
  <!-- Ground Hatch Marks -->
  <path d="M 60,160 L 50,175
           M 90,160 L 80,175
           M 120,160 L 110,175
           M 150,160 L 140,175
           M 180,160 L 170,175
           M 210,160 L 200,175
           M 240,160 L 230,175
           M 270,160 L 260,175
           M 300,160 L 290,175
           M 330,160 L 320,175
           M 360,160 L 350,175
           M 390,160 L 380,175
           M 420,160 L 410,175" stroke="#000000" stroke-width="1.5" />

  <!-- Block A -->
  <rect x="220" y="60" width="60" height="100" fill="#FFFFFF" stroke="#000000" stroke-width="2" />
  <text x="250" y="115" font-family="Times New Roman, serif" font-size="28" font-style="italic" text-anchor="middle" dominant-baseline="middle">A</text>

  <!-- Block B -->
  <rect x="280" y="60" width="60" height="100" fill="#FFFFFF" stroke="#000000" stroke-width="2" />
  <text x="310" y="115" font-family="Times New Roman, serif" font-size="28" font-style="italic" text-anchor="middle" dominant-baseline="middle">B</text>

  <!-- Bullet -->
  <path d="M 140,110 L 165,110 L 175,113 L 165,116 L 140,116 Z" fill="#FFFFFF" stroke="#000000" stroke-width="2" />
  <!-- Bullet tip detail -->
  <line x1="165" y1="110" x2="165" y2="116" stroke="#000000" stroke-width="1.5" />
</svg>